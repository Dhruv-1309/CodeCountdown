name: Refresh contest feed

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: contest-feed-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      CLIST_USERNAME: ${{ secrets.CLIST_USERNAME }}
      CLIST_API_KEY: ${{ secrets.CLIST_API_KEY }}
    steps:
      - name: Validate configuration
        shell: bash
        run: |
          if [[ -z "$CLIST_USERNAME" || -z "$CLIST_API_KEY" ]]; then
            echo "CLIST_USERNAME and CLIST_API_KEY repository secrets are required."
            exit 1
          fi

      - name: Fetch and sanitize contests
        shell: bash
        run: |
          mkdir -p public

          api_url="https://clist.by/api/v4/contest/?upcoming=true&resource_id__in=1%2C102%2C2%2C93&limit=100"
          trim_whitespace() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          clist_username="$(trim_whitespace "$CLIST_USERNAME")"
          clist_api_key="$(trim_whitespace "$CLIST_API_KEY")"
          auth_credential="${clist_username}:${clist_api_key}"
          # Accept CLIST_API_KEY as either "key" or "username:key".
          if [[ "$clist_api_key" == *:* && "$clist_api_key" == "${clist_username}:"* ]]; then
            auth_credential="$clist_api_key"
          fi

          if ! contest_payload="$(curl --fail --silent --show-error --retry 3 \
            --header "Authorization: ApiKey ${auth_credential}" \
            "$api_url")"; then
            echo "Header-based CLIST auth failed, retrying with query-parameter auth." >&2
            if ! contest_payload="$(curl --fail --silent --show-error --retry 3 --get \
              --data-urlencode "username=${clist_username}" \
              --data-urlencode "api_key=${clist_api_key}" \
              "$api_url")"; then
              echo "Unable to fetch contests from CLIST API with either auth method. Configure CLIST_USERNAME and CLIST_API_KEY in GitHub repository secrets (README maintainer setup); CLIST_API_KEY can be key-only or username:key." >&2
              exit 1
            fi
          fi

          printf '%s' "$contest_payload" \
            | jq '{objects: [.objects[] | {id, event, resource_id, start, end, duration, href}]}' \
            > public/contests.json
          jq --exit-status '.objects | type == "array"' public/contests.json > /dev/null

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload contest feed
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy contest feed
        id: deployment
        uses: actions/deploy-pages@v4
